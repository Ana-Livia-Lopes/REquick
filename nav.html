  <link rel="stylesheet" href="navbar.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <nav id="NavLateral">

    <div id="TopoNav">
      <span class="material-symbols-outlined" id="IconeHamburger">menu</span>
    </div>

    <div id="ItensNav">

      <a href="index.html" class="LinkNav LinkNavAtivo">
        <span class="material-symbols-outlined IconeNav">grid_view</span>
        <span class="TextoNav">Dashboard</span>

      <a href="projetos.html" class="LinkNav">
        <span class="material-symbols-outlined IconeNav">folder_open</span>

    <div id="RodapeNav">
      <div id="AvatarNav">VK</div>
      <div id="InfoUsuarioNav">

      </div>
    </div>

  </nav>

</html>
<style>
    /* -------RESET------- */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  height: 100%;
  overflow: hidden;
}

/* -------NAV LATERAL------- */
#NavLateral {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  background-color: #2E3A52;
  width: 68px;
  height: 100vh;
  border-radius: 8px;
  margin: 3px;
  position: fixed;
  top: 0;
  left: 0;
  z-index: 999;
  transition: width 0.4s ease;
  justify-content: space-between;
  overflow: hidden;
}

#NavLateral:hover {
  width: 230px;
}

/* -------TOPO COM HAMBURGER------- */
#TopoNav {
  display: flex;
  align-items: center;
  justify-content: flex-start;
  padding-left: 18px;
  width: 100%;
  height: 60px;
  background-color: rgba(255, 255, 255, 0.07);
  border-radius: 8px 8px 0 0;
  flex-shrink: 0;
}

#IconeHamburger {
  color: #8fa3c0;
  font-size: 26px;
  font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 40;
}

/* -------ITENS DE NAVEGAÇÃO------- */
#ItensNav {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 16px 10px;
  flex: 1;
  width: 100%;
}

.LinkNav {
  display: flex;
  align-items: center;
  gap: 0;
  text-decoration: none;
  border-radius: 8px;
  height: 44px;
  padding-left: 10px;
  width: 48px;
  overflow: hidden;
  transition: background-color 0.25s, width 0.4s ease;
  white-space: nowrap;
}

#NavLateral:hover .LinkNav {
  width: 206px;
  gap: 10px;
}

.LinkNav:hover {
  background-color: rgba(255, 255, 255, 0.10);
}

.LinkNavAtivo {
  background-color: rgba(255, 255, 255, 0.14);
}

.LinkNavAtivo:hover {
  background-color: rgba(255, 255, 255, 0.18);
}

.IconeNav {
  color: #8fa3c0;
  font-size: 22px;
  font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 40;
  flex-shrink: 0;
  width: 28px;
  text-align: center;
}

.LinkNavAtivo .IconeNav {
  color: #ffffff;
}

.TextoNav {
  color: #8fa3c0;
  font-family: 'Sora', sans-serif;
  font-size: 13.5px;
  font-weight: 600;
  opacity: 0;
  transition: opacity 0.25s ease;
  pointer-events: none;
}

.LinkNavAtivo .TextoNav {
  color: #ffffff;
}

#NavLateral:hover .TextoNav {
  opacity: 1;
}

/* -------RODAPE / PERFIL------- */
#RodapeNav {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 12px;
  border-top: 1px solid rgba(255, 255, 255, 0.08);
  width: 100%;
  overflow: hidden;
  flex-shrink: 0;
}

#AvatarNav {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background-color: #3a6fd8;
  color: #ffffff;
  font-family: 'Sora', sans-serif;
  font-size: 12px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

#InfoUsuarioNav {
  display: flex;
  flex-direction: column;
  gap: 2px;
  opacity: 0;
  transition: opacity 0.25s ease;
  white-space: nowrap;
}

#NavLateral:hover #InfoUsuarioNav {
  opacity: 1;
}

#NomeUsuarioNav {
  font-family: 'Sora', sans-serif;
  font-size: 12.5px;
  font-weight: 700;
  color: #ffffff;
}

#CargoUsuarioNav {
  font-family: 'Sora', sans-serif;
  font-size: 11px;
  color: #8fa3c0;
}

/* -------RESPONSIVO MOBILE------- */
@media (max-width: 700px) {
  #NavLateral {
    width: 100%;
    height: 58px;
    border-radius: 0;
    margin: 0;
    flex-direction: row;
    align-items: center;
    justify-content: flex-start;
    top: 0;
    left: 0;
    right: 0;
    padding: 0 16px;
    gap: 0;
  }

  #NavLateral:hover {
    width: 100%;
    height: 58px;
  }

  #TopoNav {
    height: 58px;
    width: auto;
    padding-left: 0;
    padding-right: 16px;
    background-color: transparent;
    border-radius: 0;
    flex-shrink: 0;
  }

  #ItensNav {
    flex-direction: row;
    flex: 1;
    padding: 0;
    gap: 4px;
    align-items: center;
  }

  .LinkNav {
    width: 44px;
    height: 38px;
    padding-left: 8px;
    border-radius: 8px;
  }

  #NavLateral:hover .LinkNav {
    width: 44px;
    gap: 0;
  }

  .TextoNav {
    display: none;
  }

  #NavLateral:hover .TextoNav {
    display: none;
    opacity: 0;
  }

  #RodapeNav {
    border-top: none;
    border-left: 1px solid rgba(255, 255, 255, 0.12);
    padding: 0 0 0 14px;
    width: auto;
    flex-shrink: 0;
  }

  #InfoUsuarioNav {
    display: none;
  }

  #NavLateral:hover #InfoUsuarioNav {
    display: none;
  }
}
</style>
